services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: petorg-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./realm-export:/opt/keycloak/data/import:ro
