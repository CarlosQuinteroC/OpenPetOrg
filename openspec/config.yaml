rules:
  proposal:
    - Define the first slice around foundation case administration and donor transparency before choosing implementation details.
    - Explicitly evaluate low-cost hosting, storage, CI/CD, and maintenance tradeoffs.
    - Identify Colombia-specific operational assumptions without treating them as legal advice.
  specs:
    - Use Given/When/Then scenarios.
    - Use RFC 2119 keywords: MUST, SHOULD, MAY.
    - Keep donation reporting and animal case progress traceable to business outcomes.
  design:
    - Document cost, operational complexity, maintainability, and open-source contribution tradeoffs.
    - Prefer simple, observable architecture before adding integrations such as social extraction or crowdfunding providers.
  tasks:
    - Slice work into reviewable units suitable for limited maintainer time.
    - Include testing setup before implementation once a stack is selected.
  apply:
    tdd: false
    test_command: ""
    notes:
      - Do not implement app code until proposal, specs, design, and tasks exist.
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Preserve archived change folders as audit history.
