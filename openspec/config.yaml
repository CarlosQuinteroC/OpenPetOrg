context: |
  Project idea: fullstack open-source platform for animal welfare foundations, mainly in Colombia.
  Current repo state: Backend/ and Frontend/ directories exist but contain no project files.
  Tech stack: not selected yet; no package, module, framework, or CI files detected.
  Architecture: not established yet; app code has not been bootstrapped.
  Testing: no test runner detected; Strict TDD disabled until a stack/test runner exists.
  Cost constraint: architecture, frontend, backend, and CI/CD decisions must prioritize very low operating cost.

